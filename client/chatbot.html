<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>Chatbot - AI</title>
    <link rel="stylesheet" href="css/chatbot.css" />
  </head>
  <body>
    <header class="header" id="header">
      <nav class="nav container">
        <div class="nav__logo">
          <h2>Chatbot AI</h2>
          <i class="bx bx-bot"></i>
        </div>

        <div class="nav__menu">
          <i class="bx bx-left-arrow-alt"></i>

          <div class="nav__links">
            <ul>
              <li><i class="bx bxs-home"></i><a href="index.html">Home</a></li>
              <li>
                <i class="bx bxs-info-circle"></i><a href="about.html">About</a>
              </li>
              <li>
                <i class="bx bxs-chat"></i>
                <a href="faq.html">FAQs</a>
              </li>
            </ul>
          </div>
        </div>

        <div class="nav__menu-right">
          <i class="bx bx-log-out signout"></i>
          <i class="bx bx-menu-alt-right"></i>
        </div>

        <button id="signout" class="signout">Signout</button>
      </nav>
    </header>

    <div id="app">
      <div id="chat_container"></div>

      <form>
        <textarea
          name="prompt"
          rows="1"
          cols="1"
          placeholder="Ask Chatbot..."
        ></textarea>
        <button type="submit"><i class="bx bx-send"></i></button>
      </form>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module" src="navigation.js"></script>
  </body>
</html>
