<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/forgotPassword.css" />
    <title>Forgot Password - Chatbot AI</title>
  </head>
  <body>
    <header class="header" id="header">
      <nav class="nav container">
        <div class="nav__logo">
          <div>
            <h2>Chatbot AI</h2>
            <i class="bx bx-bot"></i>
          </div>
        </div>

        <div class="nav__menu">
          <i class="bx bx-left-arrow-alt"></i>

          <div class="nav__links">
            <ul>
              <li><i class="bx bxs-home"></i><a href="/index">Home</a></li>
              <li>
                <i class="bx bxs-info-circle"></i><a href="/about">About</a>
              </li>
              <li>
                <i class="bx bxs-chat"></i>
                <a href="faq.html">FAQs</a>
              </li>
              <li>
                <i class="bx bxs-purchase-tag"></i>
                <a href="/pricing">Pricing</a>
              </li>
            </ul>
          </div>
        </div>

        <div class="nav__menu-right">
          <i class="bx bx-user-circle login__btn"></i>
          <p class="nav__retrived-username"></p>
          <i class="bx bx-chevron-down"></i>
          <i class="bx bx-menu-alt-right"></i>

          <div class="nav__dropdown-menu">
            <button class="nav__trigger-menu" type="button">Menu</button>
            <button class="nav__redirect-chatbot" type="button">Chatbot</button>
            <button class="signout" type="button">Signout</button>
          </div>
        </div>

        <button class="login__btn" id="login">Login</button>

        <!-- Username after login (take from localstorage) -->
        <div class="nav__login-username">
          <p class="nav__retrived-username"></p>
          <i class="bx bx-chevron-down"></i>

          <div class="nav__dropdown-menu">
            <button class="nav__redirect-chatbot" type="button">Chatbot</button>
            <button class="signout" type="button">Signout</button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="password container">
        <div class="password__container">
          <div class="reset__password-content">
            <h1>Forgot Your Password?</h1>
            <p>
              "Locked out? No worries! Our 'Forgot Password' feature helps you
              reset seamlessly. Enter your email, follow the steps, and regain
              access securely.
            </p>
          </div>
          <form class="reset__password-form">
            <h1>Reset Password</h1>

            <div class="reset__password-email">
              <label>Email</label>
              <input type="email" id="reset-password-email" />
              <p class="error__text"></p>
            </div>

            <button type="submit" id="verify-email-address">
              Verify email address
            </button>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="js/navigation.js"></script>
    <script type="module" src="js/forgotPassword.js"></script>
  </body>
</html>
