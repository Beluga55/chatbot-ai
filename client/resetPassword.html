<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Chatbot AI</title>
    <link rel="stylesheet" href="css/resetPassword.css" />
  </head>
  <body>
    <main>
      <section class="password container">
        <div class="password__container">
          <form class="reset__password-form">
            <h1>Reset Password</h1>
            <p class="reset__user"></p>

            <div class="reset__password-email">
              <label>New Password</label>
              <input
                type="password"
                class="new__password"
                id="reset-password-email"
              />
              <p class="error__text"></p>
            </div>

            <div class="reset__password-email">
              <label>Verify Password</label>
              <input
                type="password"
                class="verify__password"
                id="reset-password-email"
              />
              <p class="error__verify-password"></p>
            </div>

            <button
              type="submit"
              class="update__password"
              id="verify-email-address"
            >
              Update Password
            </button>
          </form>
        </div>

        <div class="password__success-overlay">
          <div class="password__success-content">
            <h1>Password reset successfully</h1>
            <p>Kindly click the button below to redirect to login page.</p>
            <a href="login.html">Login now</a>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="retrieveEmail.js"></script>
    <script type="module" src="authMiddleware.js"></script>
  </body>
</html>
